---
- name: VMware Datastore Capacity Report
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    datacenter_name: "Datacenter_Demo"
    report_datastore_type: "ALL"   # ALL, VMFS veya NFS yazabilirsin
    bytes_in_gb: 1073741824
    bytes_in_tb: 1099511627776
    warning_threshold_percent: 80
    critical_threshold_percent: 90

  tasks:
    - name: Gather datastore information from vCenter
      community.vmware.vmware_datastore_info:
        hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
        username: "{{ lookup('env', 'VMWARE_USER') }}"
        password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
        validate_certs: false
        datacenter_name: "{{ datacenter_name }}"
        schema: summary
        gather_vmfs_mount_info: true
      delegate_to: localhost
      register: datastore_info

    - name: Select datastores for report
      ansible.builtin.set_fact:
        selected_datastores: >-
          {{
            datastore_info.datastores
            if report_datastore_type == "ALL"
            else datastore_info.datastores | selectattr('type', 'equalto', report_datastore_type) | list
          }}

    - name: Initialize datastore report
      ansible.builtin.set_fact:
        datastore_report: []

    - name: Build datastore report data
      ansible.builtin.set_fact:
        datastore_report: "{{ datastore_report + [ report_item ] }}"
      vars:
        capacity_gb: "{{ ((item.capacity | float) / bytes_in_gb) | round(2) }}"
        free_gb: "{{ ((item.freeSpace | float) / bytes_in_gb) | round(2) }}"
        used_gb: "{{ (((item.capacity | float) - (item.freeSpace | float)) / bytes_in_gb) | round(2) }}"
        provisioned_gb: "{{ ((item.provisioned | default(0) | float) / bytes_in_gb) | round(2) }}"
        uncommitted_gb: "{{ ((item.uncommitted | default(0) | float) / bytes_in_gb) | round(2) }}"

        capacity_tb: "{{ ((item.capacity | float) / bytes_in_tb) | round(2) }}"
        free_tb: "{{ ((item.freeSpace | float) / bytes_in_tb) | round(2) }}"
        used_tb: "{{ (((item.capacity | float) - (item.freeSpace | float)) / bytes_in_tb) | round(2) }}"
        provisioned_tb: "{{ ((item.provisioned | default(0) | float) / bytes_in_tb) | round(2) }}"
        uncommitted_tb: "{{ ((item.uncommitted | default(0) | float) / bytes_in_tb) | round(2) }}"

        used_percent: "{{ ((((item.capacity | float) - (item.freeSpace | float)) / (item.capacity | float)) * 100) | round(2) }}"

        capacity_display: "{{ (capacity_tb ~ ' TB') if (item.capacity | float >= bytes_in_tb) else (capacity_gb ~ ' GB') }}"
        free_display: "{{ (free_tb ~ ' TB') if (item.freeSpace | float >= bytes_in_tb) else (free_gb ~ ' GB') }}"
        used_display: "{{ (used_tb ~ ' TB') if (((item.capacity | float) - (item.freeSpace | float)) >= bytes_in_tb) else (used_gb ~ ' GB') }}"
        provisioned_display: "{{ (provisioned_tb ~ ' TB') if (item.provisioned | default(0) | float >= bytes_in_tb) else (provisioned_gb ~ ' GB') }}"
        uncommitted_display: "{{ (uncommitted_tb ~ ' TB') if (item.uncommitted | default(0) | float >= bytes_in_tb) else (uncommitted_gb ~ ' GB') }}"

        type_display: >-
          {% if item.type == 'VMFS' and item.vmfs_version is defined %}
          VMFS {{ item.vmfs_version | string | regex_replace('\..*$', '') }}
          {% else %}
          {{ item.type }}
          {% endif %}

        status_value: >-
          {% if used_percent | float >= critical_threshold_percent %}
          CRITICAL
          {% elif used_percent | float >= warning_threshold_percent %}
          WARNING
          {% else %}
          OK
          {% endif %}

        report_item:
          datastore_name: "{{ item.name }}"
          datastore_type: "{{ type_display | trim }}"
          capacity: "{{ capacity_display }}"
          free: "{{ free_display }}"
          used: "{{ used_display }}"
          used_percent: "{{ used_percent }}"
          provisioned: "{{ provisioned_display }}"
          uncommitted: "{{ uncommitted_display }}"
          capacity_tb: "{{ capacity_tb }}"
          free_tb: "{{ free_tb }}"
          used_tb: "{{ used_tb }}"
          provisioned_tb: "{{ provisioned_tb }}"
          uncommitted_tb: "{{ uncommitted_tb }}"
          accessible: "{{ item.accessible }}"
          status: "{{ status_value | trim }}"
      loop: "{{ selected_datastores }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Calculate total values
      ansible.builtin.set_fact:
        total_capacity_tb: "{{ (datastore_report | map(attribute='capacity_tb') | map('float') | sum) | round(2) }}"
        total_free_tb: "{{ (datastore_report | map(attribute='free_tb') | map('float') | sum) | round(2) }}"
        total_used_tb: "{{ (datastore_report | map(attribute='used_tb') | map('float') | sum) | round(2) }}"
        total_provisioned_tb: "{{ (datastore_report | map(attribute='provisioned_tb') | map('float') | sum) | round(2) }}"
        total_used_percent: "{{ (((datastore_report | map(attribute='used_tb') | map('float') | sum) / (datastore_report | map(attribute='capacity_tb') | map('float') | sum)) * 100) | round(2) }}"

           - name: Print report title
      ansible.builtin.debug:
        msg: "========== VMware Datastore Capacity Report | Datacenter={{ datacenter_name }} | Filter={{ report_datastore_type }} =========="

    - name: Print report columns
      ansible.builtin.debug:
        msg: "Datastore_Name | Type | Capacity | Free | Used | Used_Percent | Provisioned | Uncommitted | Accessible | Status"

    - name: Print report separator
      ansible.builtin.debug:
        msg: "--------------------------------------------------------------------------------------------------------------------------------"

    - name: Print datastore report rows
      ansible.builtin.debug:
        msg: "{{ item.datastore_name }} | {{ item.datastore_type }} | {{ item.capacity }} | {{ item.free }} | {{ item.used }} | {{ item.used_percent }}% | {{ item.provisioned }} | {{ item.uncommitted }} | {{ item.accessible }} | {{ item.status }}"
      loop: "{{ datastore_report }}"
      loop_control:
        label: "{{ item.datastore_name }}"

    - name: Print report separator before total
      ansible.builtin.debug:
        msg: "--------------------------------------------------------------------------------------------------------------------------------"

    - name: Print report total
      ansible.builtin.debug:
        msg: "TOTAL | - | {{ total_capacity_tb }} TB | {{ total_free_tb }} TB | {{ total_used_tb }} TB | {{ total_used_percent }}% | {{ total_provisioned_tb }} TB | - | - | -"

        - name: Print CSV header
      ansible.builtin.debug:
        msg: "CSV: Datastore_Name,Datastore_Type,Capacity,Free,Used,Used_Percent,Provisioned,Uncommitted,Accessible,Status"

    - name: Print CSV rows
      ansible.builtin.debug:
        msg: 'CSV: "{{ item.datastore_name }}","{{ item.datastore_type }}","{{ item.capacity }}","{{ item.free }}","{{ item.used }}","{{ item.used_percent }}","{{ item.provisioned }}","{{ item.uncommitted }}","{{ item.accessible }}","{{ item.status }}"'
      loop: "{{ datastore_report }}"
      loop_control:
        label: "{{ item.datastore_name }}"

    - name: Print CSV total
      ansible.builtin.debug:
        msg: 'CSV: "TOTAL","-","{{ total_capacity_tb }} TB","{{ total_free_tb }} TB","{{ total_used_tb }} TB","{{ total_used_percent }}","{{ total_provisioned_tb }} TB","-","-","-"'
    
