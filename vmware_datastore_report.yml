---
- name: VMware Datastore Capacity Report
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    datacenter_name: "Datacenter_Demo"
    report_datastore_type: "VMFS"   # VMFS, NFS veya ALL
    bytes_in_tb: 1099511627776
    warning_threshold_percent: 80
    critical_threshold_percent: 90

  tasks:
    - name: Gather datastore information from vCenter
      community.vmware.vmware_datastore_info:
        hostname: "{{ lookup('env', 'VMWARE_HOST') }}"
        username: "{{ lookup('env', 'VMWARE_USER') }}"
        password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
        validate_certs: false
        datacenter_name: "{{ datacenter_name }}"
        schema: summary
        gather_vmfs_mount_info: true
      delegate_to: localhost
      register: datastore_info

    - name: Select datastores for report
      ansible.builtin.set_fact:
        selected_datastores: >-
          {{
            datastore_info.datastores
            if report_datastore_type == "ALL"
            else datastore_info.datastores | selectattr('type', 'equalto', report_datastore_type) | list
          }}

    - name: Initialize datastore report
      ansible.builtin.set_fact:
        datastore_report: []

    - name: Build datastore report data
      ansible.builtin.set_fact:
        datastore_report: "{{ datastore_report + [ report_item ] }}"
      vars:
        capacity_tb: "{{ ((item.capacity | float) / bytes_in_tb) | round(2) }}"
        free_tb: "{{ ((item.freeSpace | float) / bytes_in_tb) | round(2) }}"
        used_tb: "{{ (((item.capacity | float) - (item.freeSpace | float)) / bytes_in_tb) | round(2) }}"
        used_percent: "{{ ((((item.capacity | float) - (item.freeSpace | float)) / (item.capacity | float)) * 100) | round(2) }}"
        provisioned_tb: "{{ ((item.provisioned | default(0) | float) / bytes_in_tb) | round(2) }}"
        uncommitted_tb: "{{ ((item.uncommitted | default(0) | float) / bytes_in_tb) | round(2) }}"
        status_value: >-
          {% if used_percent | float >= critical_threshold_percent %}
          CRITICAL
          {% elif used_percent | float >= warning_threshold_percent %}
          WARNING
          {% else %}
          OK
          {% endif %}
        report_item:
          name: "{{ item.name }}"
          type: "{{ item.type }}"
          capacity_tb: "{{ capacity_tb }}"
          free_tb: "{{ free_tb }}"
          used_tb: "{{ used_tb }}"
          used_percent: "{{ used_percent }}"
          provisioned_tb: "{{ provisioned_tb }}"
          uncommitted_tb: "{{ uncommitted_tb }}"
          accessible: "{{ item.accessible }}"
          status: "{{ status_value | trim }}"
      loop: "{{ selected_datastores }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Calculate total values
      ansible.builtin.set_fact:
        total_capacity_tb: "{{ (datastore_report | map(attribute='capacity_tb') | map('float') | sum) | round(2) }}"
        total_free_tb: "{{ (datastore_report | map(attribute='free_tb') | map('float') | sum) | round(2) }}"
        total_used_tb: "{{ (datastore_report | map(attribute='used_tb') | map('float') | sum) | round(2) }}"
        total_provisioned_tb: "{{ (datastore_report | map(attribute='provisioned_tb') | map('float') | sum) | round(2) }}"
        total_used_percent: "{{ (((datastore_report | map(attribute='used_tb') | map('float') | sum) / (datastore_report | map(attribute='capacity_tb') | map('float') | sum)) * 100) | round(2) }}"

    - name: Report header
      ansible.builtin.debug:
        msg: "REPORT: VMware Datastore Capacity Report | Datacenter={{ datacenter_name }} | Type={{ report_datastore_type }} | Unit=TB"

    - name: Report lines
      ansible.builtin.debug:
        msg: "REPORT: {{ item.name }} | Type={{ item.type }} | Capacity={{ item.capacity_tb }} TB | Free={{ item.free_tb }} TB | Used={{ item.used_tb }} TB | Used={{ item.used_percent }}% | Provisioned={{ item.provisioned_tb }} TB | Uncommitted={{ item.uncommitted_tb }} TB | Accessible={{ item.accessible }} | Status={{ item.status }}"
      loop: "{{ datastore_report }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Report total
      ansible.builtin.debug:
        msg: "REPORT: TOTAL | Capacity={{ total_capacity_tb }} TB | Free={{ total_free_tb }} TB | Used={{ total_used_tb }} TB | Used={{ total_used_percent }}% | Provisioned={{ total_provisioned_tb }} TB"

    - name: CSV header
      ansible.builtin.debug:
        msg: "CSV: Datastore,Type,Capacity_TB,Free_TB,Used_TB,Used_Percent,Provisioned_TB,Uncommitted_TB,Accessible,Status"

    - name: CSV lines
      ansible.builtin.debug:
        msg: 'CSV: "{{ item.name }}","{{ item.type }}","{{ item.capacity_tb }}","{{ item.free_tb }}","{{ item.used_tb }}","{{ item.used_percent }}","{{ item.provisioned_tb }}","{{ item.uncommitted_tb }}","{{ item.accessible }}","{{ item.status }}"'
      loop: "{{ datastore_report }}"
      loop_control:
        label: "{{ item.name }}"

    - name: CSV total
      ansible.builtin.debug:
        msg: 'CSV: "TOTAL","-","{{ total_capacity_tb }}","{{ total_free_tb }}","{{ total_used_tb }}","{{ total_used_percent }}","{{ total_provisioned_tb }}","-","-","-"'
